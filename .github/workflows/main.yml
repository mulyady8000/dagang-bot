name: Collect market data

on:
  schedule:
    - cron: '*/10 * * * *'
    - cron: '3-59/10 * * * *'
    - cron: '7-59/10 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: collect
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    env:
      LOOP_SECONDS: "540"
      POLL_INTERVAL: "30"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - run: pip install -r requirements.txt

      - run: python cloud_collect.py

      - name: Commit new data
        run: |
          git config user.name "data-bot"
          git config user.email "data-bot@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "no new data to commit"
          else
            git commit -m "data: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            for i in 1 2 3; do
              if git pull --rebase --autostash origin "${GITHUB_REF_NAME}" && git push; then
                break
              fi
              sleep $((RANDOM % 5 + 1))
            done
          fi
